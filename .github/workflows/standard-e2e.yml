name: Standard E2E Tests

on:
  push:
  pull_request:

env:
  LOG_LEVEL: DEBUG

jobs:
  standard-e2e:
    timeout-minutes: 15
    # TODO should we use the same container as circle & central?
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: npm ci
    - run: make run-docker-postgres

    - name: E2E Test
      timeout-minutes: 10
      run: ./test/e2e/standard/run-tests.sh

    - uses: ./.github/actions/install-postgres-client
      with:
        postgres-version: 14
    - name: Grant postgres superuser role
      # As per #1368, this role is required to create the pgrowlocks extension
      run: psql -c 'ALTER ROLE jubilant SUPERUSER' postgresql://postgres:odktest@localhost/postgres
    - name: Backup/restore tests
      timeout-minutes: 10
      run: ./test/e2e/standard/backup-restore.sh
    - name: Backup test - test detection of aborted backup process - sabotage DB
      run: psql -c 'ALTER ROLE jubilant NOSUPERUSER; REVOKE SELECT ON TABLE knex_migrations FROM jubilant;' postgresql://postgres:odktest@localhost/jubilant
    - name: Backup test - test detection of aborted backup process
      timeout-minutes: 2
      run: ./test/e2e/standard/backup-abortstream.sh
    - name: Backup test - test detection of aborted backup process - unsabotage DB
      run: psql -c 'GRANT SELECT ON TABLE knex_migrations TO jubilant' postgresql://postgres:odktest@localhost/jubilant
    - name: Backend Logs
      if: always()
      run: "! [[ -f ./server.log ]] || cat ./server.log"
