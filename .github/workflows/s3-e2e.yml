name: S3 E2E Tests

on:
  push:
  pull_request:

jobs:
  s3-e2e:
    timeout-minutes: 15
    # TODO should we use the same container as circle & central?
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: make fake-s3-server-persistent
    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: npm ci
    - run: make run-docker-postgres
    - run: sudo apt-get install wait-for-it
    - name: E2E Test
      timeout-minutes: 10
      run: ./test/e2e/s3/run-tests.sh
    - name: Backend Logs
      if: always()
      run: "! [[ -f ./server.log ]] || cat ./server.log"
